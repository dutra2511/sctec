<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sou Candidato</title>
</head>
<body>
    <h3>Formulario de inscrição</h3>

    <form action="">
        <label for="nome">Nome Completo: </label>
        <input type="text" name="nome" id="nome" required><br>
        <label for="email">E-mail: </label>
        <input type="email" name="email" id="email" required><br>
        <label for="idade">Idade: </label>
        <input type="number" name="idade" id="idade" size="5"><br>
        <label for="materia">Para qual materia você esta se cadidatando: </label>
        <select name="materia" id="materia">
            <option value="matematica">Matemática</option>
            <option value="portugues">Português</option>
            <option value="biologia">Biologia</option>
            <option value="ciencias">Ciências</option>
            <option value="historia">história</option>
            <option value="geografia">Geografia</option>
            <option value="artes">Artes</option>
        </select><br>
        <label for="escolaridade">Qual sua escolaridade: </label>
        <select name="escolaridade" id="escolaridadea">
            <option value="superior">Ensino superior completo</option>
            <option value="cmestrado">Cursando mestrado</option>
            <option value="mestrado">Mestrado completo</option>
            <option value="cdoutorado">Cursando doutorado</option>
            <option value="doutorado">Doutorado completo</option>
            
        </select><br>
        <label for="descricao">Breve descrição sobre si mesmo: </label>
        <textarea name="descricao" id="descricaom" cols="30" rows="5"></textarea><br>

        <input type="submit" value="Enviar">

    </form>
</body>
</html>
